# Single‑page‑app + /api reverse‑proxy
server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;

    index index.html;

    # --- Static SPA files ---
    location / {
        try_files $uri $uri/ /index.html;
    }

    # --- API proxy to FastAPI service inside Docker network ---
    location /api/ {
        proxy_pass http://backend:8000/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }
    # --- 2nd proxy: /apidoc/ -> backend /apidoc/  ← NEW ---------------
    location /apidoc/ {
        proxy_pass http://backend:8000/api/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    gzip on;
}